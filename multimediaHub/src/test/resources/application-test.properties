# ===================================================================
# \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438 \u0437\u0430 \u0431\u0430\u0437\u0430\u0442\u0430 \u0434\u0430\u043D\u043D\u0438 - H2 \u0432 \u043F\u0430\u043C\u0435\u0442\u0442\u0430 \u0441 MySQL \u0441\u044A\u0432\u043C\u0435\u0441\u0442\u0438\u043C\u043E\u0441\u0442
# ===================================================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER,YEAR
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# JPA / Hibernate \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438 \u0437\u0430 \u0438\u043D\u0442\u0435\u0433\u0440\u0430\u0446\u0438\u043E\u043D\u043D\u0438 \u0447\u0435\u0441\u0442\u043E\u0432\u0435
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# \u0411\u0415\u0417\u041E\u041F\u0410\u0421\u0415\u041D \u0424\u0418\u041A\u0421: \u0421\u043F\u0438\u0440\u0430\u043C\u0435 \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u043D\u0438\u044F DataInitializer \u0441\u0430\u043C\u043E \u0437\u0430 \u0442\u0435\u0441\u0442\u043E\u0432\u0435\u0442\u0435,
# \u0437\u0430 \u0434\u0430 \u043D\u0435 \u0438\u0437\u043F\u0440\u0435\u0432\u0430\u0440\u0432\u0430 Hibernate \u0438 \u0434\u0430 \u043D\u0435 \u0433\u044A\u0440\u043C\u0438 \u0441 "Table not found".
app.init.enabled=false

# ===================================================================
# \u041B\u043E\u0433\u0438\u0440\u0430\u043D\u0435 \u0438 \u043F\u0440\u043E\u0441\u043B\u0435\u0434\u044F\u0432\u0430\u043D\u0435 \u043D\u0430 SQL \u0437\u0430\u044F\u0432\u043A\u0438
# ===================================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE