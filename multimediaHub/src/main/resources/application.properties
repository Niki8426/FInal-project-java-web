spring.application.name=multimediaHub

# Base configuration

# \u0421\u043F\u0435\u0446\u0438\u0444\u0438\u0446\u0438\u0440\u0430 \u0441\u043E\u0444\u0442\u0443\u0435\u0440\u043D\u0438\u044F "\u0434\u0438\u0430\u043B\u0435\u043A\u0442" \u043D\u0430 Hibernate \u0437\u0430 \u043A\u043E\u043C\u0443\u043D\u0438\u043A\u0430\u0446\u0438\u044F \u0441 \u0431\u0430\u0437\u0430\u0442\u0430 \u0434\u0430\u043D\u043D\u0438.
# \u041A\u0430\u0437\u0432\u0430 \u043D\u0430 ORM \u0440\u0430\u043C\u043A\u0430\u0442\u0430 \u0434\u0430 \u0433\u0435\u043D\u0435\u0440\u0438\u0440\u0430 SQL \u0437\u0430\u044F\u0432\u043A\u0438, \u043E\u043F\u0442\u0438\u043C\u0438\u0437\u0438\u0440\u0430\u043D\u0438 \u043A\u043E\u043D\u043A\u0440\u0435\u0442\u043D\u043E \u0437\u0430 \u0441\u0438\u043D\u0442\u0430\u043A\u0441\u0438\u0441\u0430 \u0438 \u0444\u0443\u043D\u043A\u0446\u0438\u0438\u0442\u0435 \u043D\u0430 MySQL 8+.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# \u0423\u043F\u0440\u0430\u0432\u043B\u044F\u0432\u0430 \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u043D\u043E\u0442\u043E \u0441\u043E\u0444\u0442\u0443\u0435\u0440\u043D\u043E \u0441\u0442\u0440\u0443\u043A\u0442\u0443\u0440\u0438\u0440\u0430\u043D\u0435 \u043D\u0430 \u0442\u0430\u0431\u043B\u0438\u0446\u0438\u0442\u0435 \u043F\u0440\u0438 \u0441\u0442\u0430\u0440\u0442\u0438\u0440\u0430\u043D\u0435.
# \u0421\u0442\u043E\u0439\u043D\u043E\u0441\u0442\u0442\u0430 "update" \u043A\u0430\u0440\u0430 Hibernate \u0434\u0430 \u043F\u0440\u043E\u0432\u0435\u0440\u044F\u0432\u0430 \u0441\u044A\u0449\u0435\u0441\u0442\u0432\u0443\u0432\u0430\u0449\u0430\u0442\u0430 \u0441\u0445\u0435\u043C\u0430 \u0432 MySQL \u0438 \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u043D\u043E \u0434\u0430 \u0434\u043E\u0431\u0430\u0432\u044F
# \u043D\u043E\u0432\u0438 \u0442\u0430\u0431\u043B\u0438\u0446\u0438 \u0438\u043B\u0438 \u043A\u043E\u043B\u043E\u043D\u0438 (\u0441\u044A\u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0430\u0449\u0438 \u043D\u0430 Java @Entity \u043A\u043B\u0430\u0441\u043E\u0432\u0435\u0442\u0435), \u0431\u0435\u0437 \u0434\u0430 \u0438\u0437\u0442\u0440\u0438\u0432\u0430 \u043D\u0430\u043B\u0438\u0447\u043D\u0438\u0442\u0435 \u0434\u0430\u043D\u043D\u0438.
spring.jpa.hibernate.ddl-auto=update

# \u0414\u0435\u0444\u0438\u043D\u0438\u0440\u0430 \u043F\u044A\u043B\u043D\u0438\u044F \u043F\u0430\u043A\u0435\u0442 \u0438 \u0438\u043C\u0435 \u043D\u0430 Java JDBC \u0434\u0440\u0430\u0439\u0432\u0435\u0440\u0430, \u043A\u043E\u0439\u0442\u043E \u0441\u043E\u0444\u0442\u0443\u0435\u0440\u044A\u0442 \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430
# \u043A\u0430\u0442\u043E \u043C\u043E\u0441\u0442 \u0437\u0430 \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043A\u043E \u0441\u0432\u044A\u0440\u0437\u0432\u0430\u043D\u0435 \u043A\u044A\u043C MySQL \u0441\u044A\u0440\u0432\u044A\u0440\u0430.
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# URL \u0430\u0434\u0440\u0435\u0441 \u0437\u0430 \u0432\u0440\u044A\u0437\u043A\u0430 \u0441 \u0431\u0430\u0437\u0430\u0442\u0430 \u0434\u0430\u043D\u043D\u0438 \u043F\u0440\u0435\u0437 \u043B\u043E\u043A\u0430\u043B\u043D\u0438\u044F \u0445\u043E\u0441\u0442 (localhost) \u043D\u0430 \u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u0438\u044F \u043F\u043E\u0440\u0442 3306.
# \u041F\u0430\u0440\u0430\u043C\u0435\u0442\u044A\u0440\u044A\u0442 "?createDatabaseIfNotExist=true" \u0435 \u043A\u0440\u0438\u0442\u0438\u0447\u043D\u0430 \u0441\u043E\u0444\u0442\u0443\u0435\u0440\u043D\u0430 \u0438\u043D\u0441\u0442\u0440\u0443\u043A\u0446\u0438\u044F \u2014 \u0430\u043A\u043E \u0431\u0430\u0437\u0430\u0442\u0430 \u0441 \u0438\u043C\u0435 "multimediaHub"
# \u0432\u0441\u0435 \u043E\u0449\u0435 \u043B\u0438\u043F\u0441\u0432\u0430 \u0432 MySQL, Spring Boot \u0449\u0435 \u044F \u0441\u044A\u0437\u0434\u0430\u0434\u0435 \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u043D\u043E \u043F\u0440\u0438 \u043F\u044A\u0440\u0432\u043E\u043D\u0430\u0447\u0430\u043B\u043D\u043E\u0442\u043E \u0441\u0442\u0430\u0440\u0442\u0438\u0440\u0430\u043D\u0435.
spring.datasource.url=jdbc:mysql://localhost:3306/multimediaHub?createDatabaseIfNotExist=true

# \u041F\u043E\u0442\u0440\u0435\u0431\u0438\u0442\u0435\u043B\u0441\u043A\u043E\u0442\u043E \u0438\u043C\u0435 \u0437\u0430 \u0430\u0434\u043C\u0438\u043D\u0438\u0441\u0442\u0440\u0430\u0442\u043E\u0440\u0441\u043A\u0438 \u0434\u043E\u0441\u0442\u044A\u043F \u0434\u043E \u0421\u0423\u0411\u0414 MySQL (\u043F\u043E \u043F\u043E\u0434\u0440\u0430\u0437\u0431\u0438\u0440\u0430\u043D\u0435 \u0435 root).
spring.datasource.username=root

# \u041F\u0430\u0440\u043E\u043B\u0430\u0442\u0430 \u0437\u0430 \u0434\u043E\u0441\u0442\u044A\u043F \u0434\u043E \u0431\u0430\u0437\u0430\u0442\u0430 \u0434\u0430\u043D\u043D\u0438, \u0441\u044A\u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0430\u0449\u0430 \u043D\u0430 \u043B\u043E\u043A\u0430\u043B\u043D\u0430\u0442\u0430 \u043A\u043E\u043D\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u044F \u043D\u0430 \u0441\u044A\u0440\u0432\u044A\u0440\u0430.
spring.datasource.password=0000

# \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0430 \u0437\u0430 \u043A\u043E\u043D\u0442\u0440\u043E\u043B \u043D\u0430 \u0441\u0438\u0441\u0442\u0435\u043C\u043D\u0438\u0442\u0435 \u043B\u043E\u0433\u043E\u0432\u0435. \u041E\u0433\u0440\u0430\u043D\u0438\u0447\u0430\u0432\u0430 \u0438\u0437\u0432\u0435\u0436\u0434\u0430\u043D\u0435\u0442\u043E \u043D\u0430 \u043F\u043E\u0434\u0440\u043E\u0431\u043D\u0438 \u0441\u044A\u043E\u0431\u0449\u0435\u043D\u0438\u044F
# \u043E\u0442 \u043F\u0435\u0440\u0441\u0438\u0441\u0442\u0438\u0440\u0430\u0449\u0438\u044F \u0441\u043B\u043E\u0439 \u043D\u0430 Hibernate \u0432 \u043A\u043E\u043D\u0437\u043E\u043B\u0430\u0442\u0430, \u043A\u0430\u0442\u043E \u0449\u0435 \u043F\u043E\u043A\u0430\u0437\u0432\u0430 \u0441\u044A\u043E\u0431\u0449\u0435\u043D\u0438\u044F \u0441\u0430\u043C\u043E \u043F\u0440\u0438 \u0432\u044A\u0437\u043D\u0438\u043A\u0432\u0430\u043D\u0435 \u043D\u0430 \u043A\u0440\u0438\u0442\u0438\u0447\u043D\u0430 \u0441\u043E\u0444\u0442\u0443\u0435\u0440\u043D\u0430 \u0433\u0440\u0435\u0448\u043A\u0430 (ERROR).
logging.level.org.hibernate.persister.entity=ERROR